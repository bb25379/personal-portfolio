<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>人生里程碑 PPT 系列</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Inter:wght@300;400;500;600&display=swap');

*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#F8F6F1;
  --surface:#FFFFFF;
  --surface2:#F2EFE8;
  --border:#E0D9CE;
  --border2:#D0C8BA;
  --ink:#1C1917;
  --ink2:#57534E;
  --ink3:#A8A29E;
  --gold:#B8913A;
  --gold2:#D4A853;
  --gold-pale:#F5EDD8;
  --serif:'Cormorant Garamond',Georgia,serif;
  --sans:'Inter',-apple-system,sans-serif;
  --shadow:0 1px 3px rgba(0,0,0,0.06),0 4px 16px rgba(0,0,0,0.04);
  --shadow-md:0 2px 8px rgba(0,0,0,0.08),0 8px 32px rgba(0,0,0,0.06);
}
html,body{height:100%;overflow:hidden;}
body{font-family:var(--sans);background:var(--bg);color:var(--ink);display:flex;flex-direction:column;}

/* ── HEADER ── */
.hdr{
  padding:0 3rem;
  height:68px;
  border-bottom:1px solid var(--border);
  background:var(--surface);
  display:flex;align-items:center;justify-content:space-between;
  flex-shrink:0;
}
.hdr-brand{display:flex;align-items:baseline;gap:1.2rem;}
.hdr-title{font-family:var(--serif);font-size:22px;font-weight:400;color:var(--ink);letter-spacing:.5px;}
.hdr-title span{color:var(--gold);}
.hdr-divider{width:1px;height:18px;background:var(--border2);}
.hdr-sub{font-size:11.5px;font-weight:400;color:var(--ink3);letter-spacing:2.5px;text-transform:uppercase;}
.total-pill{
  font-family:var(--sans);font-size:12px;font-weight:500;
  color:var(--gold);background:var(--gold-pale);
  padding:6px 18px;border:1px solid #E8D5A8;
  letter-spacing:.5px;
}

/* ── MAIN ── */
.main{display:flex;flex:1;overflow:hidden;min-height:0;}

/* ── SIDEBAR ── */
.sidebar{
  width:320px;flex-shrink:0;
  border-right:1px solid var(--border);
  background:var(--surface);
  overflow-y:auto;
  padding:.5rem 0;
}
.vi{
  padding:.85rem 1.2rem;
  cursor:pointer;
  border-left:3px solid transparent;
  transition:all .18s ease;
  display:flex;align-items:center;gap:10px;
}
.vi:hover{background:#FAF8F4;}
.vi.active{background:var(--gold-pale);border-left-color:var(--gold);}
.vi-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.vi-info{flex:1;min-width:0;}
.vi-name{font-size:14px;font-weight:500;color:var(--ink2);margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.vi-tag{font-size:10px;color:var(--ink3);letter-spacing:1px;text-transform:uppercase;}

/* 下載按鈕樣式 */
.vi-dl-btn{
  width:32px;height:24px;background:var(--surface2);border:1px solid var(--border);
  border-radius:4px;color:var(--ink3);font-size:12px;display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:all 0.2s;text-decoration:none;
}
.vi-dl-btn:hover{background:var(--gold);color:white;border-color:var(--gold);}

/* ── RIGHT ── */
.right{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;background:var(--bg);}
.pvhdr{
  padding:.9rem 2rem;
  border-bottom:1px solid var(--border);
  background:var(--surface);
  display:flex;align-items:center;justify-content:space-between;
  flex-shrink:0;gap:1.5rem;
}
.pvhdr-title{font-family:var(--serif);font-size:17px;font-weight:400;font-style:italic;color:var(--ink2);}
.tab-row{display:flex;border:1px solid var(--border2);overflow:hidden;}
.tab-btn{
  font-family:var(--sans);font-size:12px;font-weight:500;
  padding:7px 20px;background:transparent;color:var(--ink3);
  border:none;border-right:1px solid var(--border2);cursor:pointer;
  letter-spacing:.5px;transition:all .15s;
}
.tab-btn.on{background:var(--gold-pale);color:var(--gold);font-weight:600;}

.pv-panels{flex:1;overflow:hidden;position:relative;min-height:0;}
.pv-a, .pv-b{width:100%;height:100%;display:none;}
.pv-a.on, .pv-b.on{display:block;}
.pv-a iframe{width:100%;height:100%;border:none;display:block;}

.pv-b{overflow-y:auto;padding:2rem 2.5rem;}
.slides-row{display:grid;grid-template-columns:repeat(3,1fr);gap:1.8rem;}
.slide-box{width:100%;aspect-ratio:16/9;background:white;border:1px solid var(--border);position:relative;overflow:hidden;}
.slide-box iframe{position:absolute;top:0;left:0;width:620px;height:348px;border:none;transform-origin:0 0;}

.ftr{padding:.75rem 3rem;border-top:1px solid var(--border);background:var(--surface);display:flex;align-items:center;justify-content:space-between;font-size:11.5px;color:var(--ink3);}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-brand">
    <div class="hdr-title">Life <span>Milestone</span> · 人生里程碑</div>
    <div class="hdr-divider"></div>
    <div class="hdr-sub">PPT Series · 10 Editions · Age 20–32</div>
  </div>
  <span class="total-pill" id="total-badge">總下載 0 次</span>
</div>

<div class="main">
  <div class="sidebar" id="sidebar"></div>
  <div class="right">
    <div class="pvhdr">
      <span class="pvhdr-title" id="pvtitle">← 請點選左側版本以預覽</span>
      <div class="tab-row">
        <button class="tab-btn on" id="tabA" onclick="switchTab('A')">產生器介面</button>
        <button class="tab-btn"    id="tabB" onclick="switchTab('B')">投影片樣式</button>
      </div>
    </div>
    <div class="pv-panels">
      <div class="pv-a on" id="panelA">
        <iframe id="frame-gen" srcdoc="<div style='display:flex;align-items:center;justify-content:center;height:100vh;background:#F8F6F1;color:#A8A29E;letter-spacing:3px;'>SELECT A VERSION</div>"></iframe>
      </div>
      <div class="pv-b" id="panelB">
        <div class="slides-row" id="slides-row"></div>
      </div>
    </div>
  </div>
</div>

<div class="ftr">
  <p>將所有 HTML 檔案放於同一資料夾，以 Chrome 開啟即可生成 PPTX</p>
  <span id="ftr-total">全版本總下載次數：0</span>
</div>

<script>
// 修正檔案路徑至 PPT_Templates 資料夾
const BASE_PATH = 'PPT_Templates/';
const VERSIONS=[
  {id:'v01',name:'深色藝術版',      file:'%E4%BA%BA%E7%94%9F%E9%87%8C%E7%A8%8B%E7%A2%91-%E4%B8%80%E8%88%AC%E7%89%88%E6%9C%AC.html',             tag:'Dark Artistic · LinkedIn',        dot:'#C9A84C'},
  {id:'v02',name:'手繪筆記手帳版',  file:'%E4%BA%BA%E7%94%9F%E9%87%8C%E7%A8%8B%E7%A2%91-%E6%89%8B%E7%B9%AA%E7%AD%86%E8%A8%98%E6%89%8B%E5%B8%B3%E7%89%88.html',       tag:'Bullet Journal · Collage',        dot:'#C4956A'},
  {id:'v03',name:'卡通可愛版',      file:'%E4%BA%BA%E7%94%9F%E9%87%8C%E7%A8%8B%E7%A2%91-%E5%8D%A1%E9%80%9A%E5%8F%AF%愛%E7%89%88.html',           tag:'Cute Pastel · Tiffany Blue',      dot:'#5BBDBD'},
  {id:'v04',name:'宇宙星系軌道版',  file:'%E4%BA%BA%E7%94%9F%E9%87%8C%E7%A8%8B%E7%A2%91-%E5%AE%87%E5%AE%99%E6%98%9F%E7%B3%BB%E8%BB%82%E9%81%93%E7%89%88.html',       tag:'Cosmic Orbit · Stellar',          dot:'#66AAFF'},
  {id:'v05',name:'明亮藝術版',      file:'%E4%BA%BA%E7%94%9F%E9%87%8C%E7%A8%8B%E7%A2%91-%E6%98%8E%亮%E8%97%9D%E8%A1%93%E7%89%88.html',           tag:'Bright Artistic · Magazine',      dot:'#C8973A'},
  {id:'v06',name:'科技深色版',      file:'%E4%BA%BA%E7%94%9F%E9%87%8C%E7%A8%8B%E7%A2%91-%E7%A7%91%E6%8A%80%E6%B7%B1%E8%89%B2%E7%89%88.html',           tag:'Tech Dark · GitHub Style',        dot:'#58A6FF'},
  {id:'v07',name:'專業質感版',      file:'%E4%BA%BA%E7%94%9F%E9%87%8C%E7%A8%8B%E7%A2%91-%E5%B0%88%E6%A5%AD%E8%B3%AA%E6%84%9F%E7%89%88.html',           tag:'Professional · Elegant',          dot:'#8A7560'},
  {id:'v08',name:'復古懷舊報刊版',  file:'%E4%BA%BA%E7%94%9F%E9%87%8C%E7%A8%8B%E7%A2%91-%E5%BE%A9%E5%8F%A4%E6%87%B4%E8%88%8A%E5%A0%B1%E5%88%8A%E7%89%88.html', tag:'Vintage Newspaper · 19th Century',dot:'#7A3A1A'},
  {id:'v09',name:'極簡北歐居家版',  file:'%E4%BA%BA%E7%94%9F%E9%87%8C%E7%A8%8B%E7%A2%91-%E6%A5%B5%E7%B0%A1%E5%8C%97%E6%AD%90%E5%B1%85%E5%AE%B6%E7%89%88.html',       tag:'Scandi Minimalist · Morandi',     dot:'#8FA8B2'},
  {id:'v10',name:'遊戲通關大地圖',  file:'%E4%BA%BA%E7%94%9F%E9%87%8C%E7%A8%8B%E7%A2%91-%E9%81%8A%E6%88%B2%E9%80%9A%E9%97%9C%E5%A4%A7%E5%9C%B0%E5%9C%96%E7%89%88.html', tag:'Game Map RPG · Pixel Art',        dot:'#FF6AC1'},
];

function buildSidebar(){
  const sb = document.getElementById('sidebar');
  VERSIONS.forEach((v, i) => {
    const el = document.createElement('div');
    el.className = 'vi';
    el.innerHTML = `
      <div class="vi-dot" style="background:${v.dot}"></div>
      <div class="vi-info" onclick="selectVersionById('${v.id}')">
        <div class="vi-name">${i+1}. ${v.name}</div>
        <div class="vi-tag">${v.tag}</div>
      </div>
      <a href="${BASE_PATH + v.file}" class="vi-dl-btn" download title="下載此版本">...</a>
    `;
    sb.appendChild(el);
  });
}

function selectVersionById(id){
  const v = VERSIONS.find(item => item.id === id);
  if(!v) return;
  document.querySelectorAll('.vi').forEach(el => el.classList.remove('active'));
  document.getElementById('pvtitle').textContent = v.name;
  
  // 更新產生器預覽 (模擬圖示中的點擊下載介面)
  const previewHtml = `
    <div style="background:#0D0C1D; color:white; height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; font-family:sans-serif;">
      <h2 style="color:${v.dot}">${v.name} PPT 產生器</h2>
      <p style="opacity:0.6; margin-bottom:30px;">20 歲 — 32 歲 · ${v.tag}</p>
      <a href="${BASE_PATH + v.file}" download style="padding:15px 40px; border:1px solid ${v.dot}; color:${v.dot}; text-decoration:none; border-radius:8px;">⬇ 生成並下載 人生里程碑.pptx</a>
    </div>
  `;
  document.getElementById('frame-gen').srcdoc = previewHtml;
}

function switchTab(t){
  document.getElementById('panelA').classList.toggle('on', t==='A');
  document.getElementById('panelB').classList.toggle('on', t==='B');
  document.getElementById('tabA').classList.toggle('on', t==='A');
  document.getElementById('tabB').classList.toggle('on', t==='B');
}

buildSidebar();
selectVersionById('v01');
</script>
</body>
</html>
