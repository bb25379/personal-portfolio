<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>人生里程碑 PPT 系列</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Inter:wght@300;400;500;600&display=swap');

*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#F8F6F1;
  --surface:#FFFFFF;
  --surface2:#F2EFE8;
  --border:#E0D9CE;
  --border2:#D0C8BA;
  --ink:#1C1917;
  --ink2:#57534E;
  --ink3:#A8A29E;
  --gold:#B8913A;
  --gold2:#D4A853;
  --gold-pale:#F5EDD8;
  --serif:'Cormorant Garamond',Georgia,serif;
  --sans:'Inter',-apple-system,sans-serif;
  --shadow:0 1px 3px rgba(0,0,0,0.06),0 4px 16px rgba(0,0,0,0.04);
  --shadow-md:0 2px 8px rgba(0,0,0,0.08),0 8px 32px rgba(0,0,0,0.06);
}
html,body{height:100%;overflow:hidden;}
body{font-family:var(--sans);background:var(--bg);color:var(--ink);display:flex;flex-direction:column;}

/* ── HEADER ── */
.hdr{
  padding:0 3rem;
  height:68px;
  border-bottom:1px solid var(--border);
  background:var(--surface);
  display:flex;align-items:center;justify-content:space-between;
  flex-shrink:0;
}
.hdr-brand{display:flex;align-items:baseline;gap:1.2rem;}
.hdr-title{font-family:var(--serif);font-size:22px;font-weight:400;color:var(--ink);letter-spacing:.5px;}
.hdr-title span{color:var(--gold);}
.hdr-divider{width:1px;height:18px;background:var(--border2);}
.hdr-sub{font-size:11.5px;font-weight:400;color:var(--ink3);letter-spacing:2.5px;text-transform:uppercase;}
.total-pill{
  font-family:var(--sans);font-size:12px;font-weight:500;
  color:var(--gold);background:var(--gold-pale);
  padding:6px 18px;border:1px solid #E8D5A8;
  letter-spacing:.5px;
}

/* ── MAIN ── */
.main{display:flex;flex:1;overflow:hidden;min-height:0;}

/* ── SIDEBAR ── */
.sidebar{
  width:300px;flex-shrink:0;
  border-right:1px solid var(--border);
  background:var(--surface);
  overflow-y:auto;
  padding:.5rem 0;
}
.sidebar::-webkit-scrollbar{width:3px;}
.sidebar::-webkit-scrollbar-thumb{background:var(--border);}

.vi{
  padding:.85rem 1.6rem;
  cursor:pointer;
  border-left:3px solid transparent;
  transition:all .18s ease;
  display:flex;align-items:center;gap:12px;
}
.vi:hover{background:#FAF8F4;}
.vi.active{background:var(--gold-pale);border-left-color:var(--gold);}
.vi.active .vi-name{color:var(--ink);}
.vi-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.vi-info{flex:1;min-width:0;}
.vi-name{
  font-size:14px;font-weight:500;color:var(--ink2);
  margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  transition:color .18s;
}
.vi.active .vi-name,.vi:hover .vi-name{color:var(--ink);}
.vi-tag{font-size:10px;font-weight:400;color:var(--ink3);letter-spacing:1.5px;text-transform:uppercase;}
.vi-count{
  font-size:11px;font-weight:500;color:var(--gold);
  background:var(--gold-pale);padding:2px 9px;
  border:1px solid #E8D5A8;
  white-space:nowrap;flex-shrink:0;letter-spacing:.5px;
}
.vi-count.dim{color:var(--ink3);background:var(--surface2);border-color:var(--border);}

/* ── RIGHT ── */
.right{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;background:var(--bg);}

/* ── PREVIEW HEADER ── */
.pvhdr{
  padding:.9rem 2rem;
  border-bottom:1px solid var(--border);
  background:var(--surface);
  display:flex;align-items:center;justify-content:space-between;
  flex-shrink:0;gap:1.5rem;
}
.pvhdr-title{
  font-family:var(--serif);font-size:17px;font-weight:400;font-style:italic;
  color:var(--ink2);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
}
.tab-row{display:flex;border:1px solid var(--border2);overflow:hidden;}
.tab-btn{
  font-family:var(--sans);font-size:12px;font-weight:500;
  padding:7px 20px;background:transparent;color:var(--ink3);
  border:none;border-right:1px solid var(--border2);cursor:pointer;
  letter-spacing:.5px;transition:all .15s;white-space:nowrap;
}
.tab-btn:last-child{border-right:none;}
.tab-btn:hover{background:var(--surface2);color:var(--ink2);}
.tab-btn.on{background:var(--gold-pale);color:var(--gold);font-weight:600;}

/* ── PANELS ── */
.pv-panels{flex:1;overflow:hidden;position:relative;min-height:0;}

.pv-a{width:100%;height:100%;display:none;}
.pv-a.on{display:block;}
.pv-a iframe{width:100%;height:100%;border:none;display:block;}

.pv-b{width:100%;height:100%;display:none;overflow-y:auto;padding:2rem 2.5rem;}
.pv-b.on{display:flex;flex-direction:column;}
.pv-b::-webkit-scrollbar{width:4px;}
.pv-b::-webkit-scrollbar-thumb{background:var(--border2);}

.slides-label{
  font-family:var(--sans);font-size:10.5px;font-weight:500;
  color:var(--ink3);letter-spacing:3px;text-transform:uppercase;
  margin-bottom:1.4rem;flex-shrink:0;
  display:flex;align-items:center;gap:12px;
}
.slides-label::after{content:'';flex:1;height:1px;background:var(--border);}

.slides-row{
  display:grid;grid-template-columns:repeat(3,1fr);
  gap:1.8rem;flex:1;min-height:0;
}
.slide-wrap{display:flex;flex-direction:column;gap:10px;min-width:0;}
.slide-tag{
  font-family:var(--sans);font-size:11px;font-weight:500;
  color:var(--ink2);letter-spacing:.5px;
  display:flex;align-items:center;gap:8px;
}
.slide-tag span{
  font-size:9.5px;font-weight:400;color:var(--ink3);
  letter-spacing:1.5px;text-transform:uppercase;
}
.slide-box{
  width:100%;aspect-ratio:16/9;
  background:var(--surface);
  border:1px solid var(--border);
  overflow:hidden;position:relative;
  box-shadow:var(--shadow);
  transition:box-shadow .2s,transform .2s;
}
.slide-box:hover{box-shadow:var(--shadow-md);transform:translateY(-2px);}
.slide-box iframe{
  position:absolute;top:0;left:0;
  width:620px;height:348px;
  border:none;pointer-events:none;
  transform-origin:0 0;
}

/* ── TOAST ── */
.toast{
  position:fixed;bottom:2rem;right:2rem;
  background:var(--surface);border:1px solid var(--border2);
  color:var(--ink);padding:12px 22px;font-size:13px;
  box-shadow:var(--shadow-md);
  opacity:0;transition:opacity .3s;pointer-events:none;z-index:999;
}
.toast.show{opacity:1;}

/* ── FOOTER ── */
.ftr{
  padding:.75rem 3rem;
  border-top:1px solid var(--border);
  background:var(--surface);
  display:flex;align-items:center;justify-content:space-between;
  flex-shrink:0;
}
.ftr p{font-size:11.5px;color:var(--ink3);letter-spacing:.3px;}
.ftr-total{font-size:12px;font-weight:500;color:var(--gold);}

/* ── SECTION DIVIDER in sidebar ── */
.sidebar-section{
  padding:.4rem 1.6rem .3rem;
  font-size:9.5px;font-weight:600;color:var(--ink3);
  letter-spacing:2.5px;text-transform:uppercase;
  margin-top:.3rem;
}
</style>
</head>
<body>

<script>
const GAS_URL = 'YOUR_GOOGLE_APPS_SCRIPT_URL_HERE';
</script>

<!-- HEADER -->
<div class="hdr">
  <div class="hdr-brand">
    <div class="hdr-title">Life <span>Milestone</span> · 人生里程碑</div>
    <div class="hdr-divider"></div>
    <div class="hdr-sub">PPT Series · 10 Editions · Age 20–32</div>
  </div>
  <span class="total-pill" id="total-badge">載入中…</span>
</div>

<div class="main">
  <!-- SIDEBAR -->
  <div class="sidebar" id="sidebar"></div>

  <!-- RIGHT -->
  <div class="right">
    <div class="pvhdr">
      <span class="pvhdr-title" id="pvtitle">← 請點選左側版本以預覽</span>
      <div class="tab-row">
        <button class="tab-btn on" id="tabA" onclick="switchTab('A')">產生器介面</button>
        <button class="tab-btn"    id="tabB" onclick="switchTab('B')">投影片樣式</button>
      </div>
    </div>
    <div class="pv-panels">
      <div class="pv-a on" id="panelA">
        <iframe id="frame-gen"
          srcdoc="<div style='display:flex;align-items:center;justify-content:center;height:100vh;background:#F8F6F1;font-family:sans-serif;'><div style='text-align:center;color:#A8A29E'><div style='font-size:40px;margin-bottom:14px;opacity:.4'>←</div><div style='font-size:13px;letter-spacing:3px;text-transform:uppercase'>Select a version</div></div></div>">
        </iframe>
      </div>
      <div class="pv-b" id="panelB">
        <p class="slides-label">Slide Preview — 投影片樣式預覽</p>
        <div class="slides-row" id="slides-row">
          <div style="color:#A8A29E;font-size:13px;grid-column:1/-1;padding-top:1rem;">← 請先選擇左側版本</div>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="ftr">
  <p>將所有 HTML 檔案放於同一資料夾，以 Chrome 開啟即可生成 PPTX</p>
  <span class="ftr-total" id="ftr-total">全版本總下載次數：讀取中…</span>
</div>
<div class="toast" id="toast"></div>

<script>
// ════════════════════════════════════════════
//  版本清單
// ════════════════════════════════════════════
const VERSIONS=[
  {id:'v01',name:'深色藝術版',      file:'人生里程碑-一般版本.html',             tag:'Dark Artistic · LinkedIn',        dot:'#C9A84C'},
  {id:'v02',name:'手繪筆記手帳版',  file:'人生里程碑-手繪筆記手帳版.html',       tag:'Bullet Journal · Collage',        dot:'#C4956A'},
  {id:'v03',name:'卡通可愛版',      file:'人生里程碑-卡通可愛版.html',           tag:'Cute Pastel · Tiffany Blue',      dot:'#5BBDBD'},
  {id:'v04',name:'宇宙星系軌道版',  file:'人生里程碑-宇宙星系軌道版.html',       tag:'Cosmic Orbit · Stellar',          dot:'#66AAFF'},
  {id:'v05',name:'明亮藝術版',      file:'人生里程碑-明亮藝術版.html',           tag:'Bright Artistic · Magazine',      dot:'#C8973A'},
  {id:'v06',name:'科技深色版',      file:'人生里程碑-科技深色版.html',           tag:'Tech Dark · GitHub Style',        dot:'#58A6FF'},
  {id:'v07',name:'專業質感版',      file:'人生里程碑-專業質感版.html',           tag:'Professional · Elegant',          dot:'#8A7560'},
  {id:'v08',name:'復古懷舊報刊版',  file:'人生里程碑-復古懷舊報刊版-還行.html', tag:'Vintage Newspaper · 19th Century',dot:'#7A3A1A'},
  {id:'v09',name:'極簡北歐居家版',  file:'人生里程碑-極簡北歐居家版.html',       tag:'Scandi Minimalist · Morandi',     dot:'#8FA8B2'},
  {id:'v10',name:'遊戲通關大地圖',file:'人生里程碑-遊戲通關大地圖版.html', tag:'Game Map RPG · Pixel Art',        dot:'#FF6AC1'},
];

let activeId=null, countsCache={}, activeTab='A';

// ════════════════════════════════════════════
//  Tab 切換
// ════════════════════════════════════════════
function switchTab(t){
  activeTab=t;
  document.getElementById('panelA').classList.toggle('on',t==='A');
  document.getElementById('panelB').classList.toggle('on',t==='B');
  document.getElementById('tabA').classList.toggle('on',t==='A');
  document.getElementById('tabB').classList.toggle('on',t==='B');
  if(t==='B') setTimeout(scaleSlides,50);
}
function scaleSlides(){
  document.querySelectorAll('.slide-box').forEach(box=>{
    const s=Math.min(box.clientWidth/620,box.clientHeight/348);
    const f=box.querySelector('iframe');
    if(f) f.style.transform=`scale(${s})`;
  });
}

// ════════════════════════════════════════════
//  版本選擇
// ════════════════════════════════════════════
function selectVersion(v){
  if(activeId===v.id) return;
  activeId=v.id;
  document.querySelectorAll('.vi').forEach(el=>el.classList.remove('active'));
  const el=document.getElementById('vi-'+v.id);
  if(el) el.classList.add('active');
  document.getElementById('pvtitle').textContent=v.name+'  ·  '+v.file;
  document.getElementById('frame-gen').srcdoc=GEN_PREVIEWS[v.id]||'';
  renderSlides(v);
  if(activeTab==='B') setTimeout(scaleSlides,80);
  if(GAS_URL&&GAS_URL!=='YOUR_GOOGLE_APPS_SCRIPT_URL_HERE') logDownload(v);
}

// ════════════════════════════════════════════
//  Slides 渲染
// ════════════════════════════════════════════
const SLIDE_LABELS=[
  {title:'封面',     sub:'Cover Slide'},
  {title:'年齡頁',   sub:'Age Slide'},
  {title:'總覽',     sub:'Summary'},
];
function renderSlides(v){
  const slides=getSlides(v.id);
  document.getElementById('slides-row').innerHTML=slides.map((html,i)=>`
    <div class="slide-wrap">
      <div class="slide-tag">
        ${SLIDE_LABELS[i]?.title||'Slide '+(i+1)}
        <span>${SLIDE_LABELS[i]?.sub||''}</span>
      </div>
      <div class="slide-box">
        <iframe srcdoc="${html.replace(/"/g,'&quot;').replace(/'/g,"&#39;")}"></iframe>
      </div>
    </div>
  `).join('');
  setTimeout(scaleSlides,80);
}

// ════════════════════════════════════════════
//  計數 / Log
// ════════════════════════════════════════════
async function loadCounts(){
  if(!GAS_URL||GAS_URL==='YOUR_GOOGLE_APPS_SCRIPT_URL_HERE'){updateTotals({});return;}
  try{
    const r=await fetch(GAS_URL+'?action=counts',{cache:'no-store'});
    const j=await r.json();
    if(j.ok){countsCache=j.counts||{};renderCounts();updateTotals(countsCache);}
  }catch(e){}
}
function renderCounts(){
  VERSIONS.forEach(v=>{
    const el=document.getElementById('cnt-'+v.id);
    if(!el)return;
    const c=(countsCache[v.id]?.count)||0;
    el.textContent=c+'次';el.classList.remove('dim');
  });
}
function updateTotals(counts){
  let t=0;Object.values(counts).forEach(v=>{t+=(v.count||0);});
  document.getElementById('total-badge').textContent='總下載 '+t+' 次';
  document.getElementById('ftr-total').textContent='全版本總下載次數：'+t;
}
async function logDownload(v){
  let ip='',country='',city='';
  try{const r=await fetch('https://ipapi.co/json/',{cache:'no-store'});const d=await r.json();ip=d.ip||'';country=d.country_name||'';city=d.city||'';}catch(e){}
  const ua=navigator.userAgent,br=parseBr(ua),os=parseOS(ua);
  const params=new URLSearchParams(window.location.search);
  const payload={versionId:v.id,versionName:v.name,ip,country,city,browser:br.name,browserVer:br.ver,os,device:/Mobi|Android|iPhone|iPad/i.test(ua)?'Mobile':'Desktop',language:navigator.language||'',timezone:Intl.DateTimeFormat().resolvedOptions().timeZone||'',screen:screen.width+'x'+screen.height,referrer:document.referrer||'(direct)',currentUrl:window.location.href,utm_source:params.get('utm_source')||'',utm_medium:params.get('utm_medium')||'',utm_campaign:params.get('utm_campaign')||''};
  if(GAS_URL&&GAS_URL!=='YOUR_GOOGLE_APPS_SCRIPT_URL_HERE') fetch(GAS_URL,{method:'POST',headers:{'Content-Type':'text/plain'},body:JSON.stringify(payload)}).catch(()=>{});
  if(!countsCache[v.id])countsCache[v.id]={count:0};
  countsCache[v.id].count+=1;renderCounts();updateTotals(countsCache);
}
function parseBr(ua){const T=[{name:'Edge',re:/Edg\/([\d.]+)/},{name:'Chrome',re:/Chrome\/([\d.]+)/},{name:'Firefox',re:/Firefox\/([\d.]+)/},{name:'Safari',re:/Version\/([\d.]+).*Safari/}];for(const t of T){const m=ua.match(t.re);if(m)return{name:t.name,ver:m[1]||''};}return{name:'Unknown',ver:''};}
function parseOS(ua){if(/Windows NT 10/.test(ua))return'Windows 10/11';if(/Windows NT 6/.test(ua))return'Windows 7/8';if(/Mac OS X/.test(ua))return'macOS';if(/iPhone|iPad/.test(ua))return'iOS';if(/Android/.test(ua))return'Android';return'Unknown';}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}

// ════════════════════════════════════════════
//  側欄建立
// ════════════════════════════════════════════
function buildSidebar(){
  const sb=document.getElementById('sidebar');
  VERSIONS.forEach((v,i)=>{
    const el=document.createElement('div');
    el.className='vi';el.id='vi-'+v.id;
    el.innerHTML=`
      <div class="vi-dot" style="background:${v.dot};box-shadow:0 0 6px ${v.dot}88;"></div>
      <div class="vi-info">
        <div class="vi-name">${i+1}.&ensp;${v.name}</div>
        <div class="vi-tag">${v.tag}</div>
      </div>
      <div class="vi-count dim" id="cnt-${v.id}">…</div>
    `;
    el.addEventListener('click',()=>selectVersion(v));
    sb.appendChild(el);
  });
}

// ════════════════════════════════════════════
//  產生器介面預覽
// ════════════════════════════════════════════
const GEN_PREVIEWS={

/* shared helpers */
function wrap(bg,content){return`<div style="width:620px;height:348px;background:${bg};position:relative;overflow:hidden;font-family:-apple-system,sans-serif;">${content}</div>`;}
function rect(x,y,w,h,bg,extra=''){return`<div style="position:absolute;left:${x}px;top:${y}px;width:${w}px;height:${h}px;background:${bg};${extra}"></div>`;}
function text(x,y,w,h,txt,style){return`<div style="position:absolute;left:${x}px;top:${y}px;width:${w}px;height:${h}px;${style}">${txt}</div>`;}
function monthGrid(bg,card,bdr,acc,tc,mu,hdrY=62){
  const ms=['一','二','三','四','五','六','七','八','九','十','十一','十二'];
  const cols=4,mx=14,gap=4,cW=(620-2*mx-(cols-1)*gap)/cols,cH=(348-hdrY-8-2*gap)/3;
  return ms.map((m,i)=>{
    const col=i%cols,row=Math.floor(i/cols),x=mx+col*(cW+gap),y=hdrY+row*(cH+gap);
    return `<div style="position:absolute;left:${x}px;top:${y}px;width:${cW}px;height:${cH}px;background:${card};border:0.5px solid ${bdr};">`+
      `<div style="height:13px;background:${bg==='#0D0C1D'?'#1E1C38':bg};display:flex;align-items:center;padding:0 4px;gap:3px;">`+
      `<span style="font-size:7px;font-weight:700;color:${acc}">${String(i+1).padStart(2,'0')}</span>`+
      `<span style="font-size:7px;color:${tc};margin-left:auto">${m}月</span></div>`+
      `<div style="height:0.5px;background:${bdr};margin:5px 4px"></div><div style="height:0.5px;background:${bdr};margin:5px 4px"></div></div>`;
  }).join('');
}
function sumGrid(bgs,accs,labels,hdrBg,hdrAcc){
  const NY=13,LW=42,GX=14+LW,GY=50,yW=(620-14-LW)/NY,HDH=20,GH=348-GY-12,rH=(GH-HDH)/4;
  let o='';
  for(let i=0;i<NY;i++){const x=GX+i*yW;o+=`<div style="position:absolute;left:${x}px;top:${GY}px;width:${yW-1}px;height:${HDH}px;background:${hdrBg};border:0.3px solid ${hdrAcc}22;"><div style="height:1.5px;background:${accs[i%4]}"></div><div style="font-size:6.5px;font-weight:700;color:${accs[i%4]};text-align:center;margin-top:2px">${20+i}</div></div>`;}
  labels.forEach((lbl,ci)=>{
    const ry=GY+HDH+ci*rH;
    o+=`<div style="position:absolute;left:14px;top:${ry+1}px;width:${LW-2}px;height:${rH-2}px;background:${bgs[ci]};border:0.5px solid ${accs[ci]};display:flex;align-items:center;justify-content:center;"><span style="font-size:7.5px;font-weight:700;color:${accs[ci]}">${lbl}</span></div>`;
    for(let i=0;i<NY;i++){const x=GX+i*yW;o+=`<div style="position:absolute;left:${x}px;top:${ry+1}px;width:${yW-1}px;height:${rH-2}px;background:${i%2===0?bgs[ci]:'transparent'};border:0.3px solid ${accs[ci]}44;"></div>`;}
  });
  return o;
}
function stars(n){return`<div style="position:absolute;">${[[50,22],[120,14],[210,28],[300,10],[390,22],[480,14],[560,26],[30,80],[590,100],[20,190],[605,170],[40,280],[590,290]].map(([x,y],i)=>`<div style="position:absolute;left:${x}px;top:${y}px;width:${i%3?2:3}px;height:${i%3?2:3}px;border-radius:50%;background:${'#FFF,#FF8,#8FF,#F8F'.split(',')[i%4]}"></div>`).slice(0,n).join('')}</div>`;}
function pixG(){let o='';for(let i=0;i<350;i+=14)o+=`<div style="position:absolute;top:${i}px;left:0;right:0;height:0.3px;background:#FFF2"></div>`;return o;}
