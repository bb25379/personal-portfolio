<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>人生里程碑 — 卡通可愛版</title>
<script src="https://cdn.jsdelivr.net/npm/pptxgenjs@3.12.0/dist/pptxgen.bundle.js"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:-apple-system,sans-serif;background:#F0FAFA;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem 1rem;}
  .card{background:#fff;border-radius:28px;padding:2.5rem 2rem;max-width:500px;width:100%;border:2.5px solid #B2E8E8;box-shadow:0 6px 32px rgba(129,210,210,0.15);}
  .emoji-row{font-size:28px;margin-bottom:1rem;letter-spacing:4px;}
  h1{font-size:22px;font-weight:700;color:#2D7D7D;margin-bottom:4px;}
  .sub{font-size:13px;color:#7ABFBF;margin-bottom:1.8rem;}
  .palette{display:flex;gap:8px;margin-bottom:1.5rem;flex-wrap:wrap;}
  .swatch{width:36px;height:36px;border-radius:50%;border:2.5px solid rgba(0,0,0,0.06);display:flex;align-items:center;justify-content:center;font-size:14px;}
  .stats{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:1.8rem;}
  .stat{border-radius:16px;padding:0.85rem 1rem;border:2px solid transparent;}
  .sl{font-size:10px;font-weight:700;letter-spacing:1px;margin-bottom:3px;}
  .sv{font-size:22px;font-weight:800;margin-bottom:1px;}
  .ss{font-size:10px;}
  .tags{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:1.8rem;}
  .tag{font-size:11px;font-weight:700;padding:5px 14px;border-radius:20px;border:2px solid;}
  button{width:100%;padding:15px;border-radius:16px;font-size:15px;font-weight:800;background:linear-gradient(135deg,#81D4D4,#A8E6CF);color:#fff;border:none;cursor:pointer;letter-spacing:1px;box-shadow:0 4px 16px rgba(129,210,210,0.35);transition:transform 0.15s,opacity 0.2s;}
  button:hover:not(:disabled){transform:translateY(-2px);}
  button:disabled{opacity:0.5;cursor:default;transform:none;}
  #status{text-align:center;font-size:12px;color:#7ABFBF;margin-top:10px;min-height:1.4em;}
</style>
</head>
<body>
<div class="card">
  <div class="emoji-row">🌸✨🎀🌿💛</div>
  <h1>人生里程碑 PPT</h1>
  <p class="sub">卡通可愛版 · 粉嫩淺色系 · 20–32 歲</p>

  <div class="palette">
    <div class="swatch" style="background:#B2E8E8" title="蒂芬妮藍">🌊</div>
    <div class="swatch" style="background:#A8E6CF" title="粉綠">🌿</div>
    <div class="swatch" style="background:#FFD3E0" title="粉紅">🌸</div>
    <div class="swatch" style="background:#FFF3B0" title="粉黃">🌟</div>
    <div class="swatch" style="background:#D4B8E0" title="薰衣草">💜</div>
    <div class="swatch" style="background:#FFD9B3" title="蜜桃">🍑</div>
    <div class="swatch" style="background:#B8D4F0" title="天空藍">☁️</div>
  </div>

  <div class="stats">
    <div class="stat" style="background:#E8FAFA;border-color:#B2E8E8;">
      <div class="sl" style="color:#5BAAAA;">SLIDES</div>
      <div class="sv" style="color:#2D7D7D;">15</div>
      <div class="ss" style="color:#7ABFBF;">頁投影片</div>
    </div>
    <div class="stat" style="background:#FFF0F5;border-color:#FFB8CC;">
      <div class="sl" style="color:#CC7090;">YEARS</div>
      <div class="sv" style="color:#AA4466;">13</div>
      <div class="ss" style="color:#CC7090;">20 ~ 32 歲</div>
    </div>
    <div class="stat" style="background:#FFFBE6;border-color:#FFE066;">
      <div class="sl" style="color:#AA8800;">MONTHS</div>
      <div class="sv" style="color:#886600;">156</div>
      <div class="ss" style="color:#AA8800;">可編輯格</div>
    </div>
    <div class="stat" style="background:#EEF5FF;border-color:#B8D4F0;">
      <div class="sl" style="color:#4A7ACC;">CATS</div>
      <div class="sv" style="color:#2A5299;">4</div>
      <div class="ss" style="color:#4A7ACC;">生活工作學習健康</div>
    </div>
  </div>

  <div class="tags">
    <div class="tag" style="background:#E8FAFA;border-color:#81D4D4;color:#2D7D7D;">🌈 生活</div>
    <div class="tag" style="background:#FFF0F5;border-color:#FFB8CC;color:#AA4466;">💼 工作</div>
    <div class="tag" style="background:#F0FFF5;border-color:#A8E6CF;color:#2D6B4A;">📚 學習</div>
    <div class="tag" style="background:#FFFBE6;border-color:#FFE066;color:#886600;">🌿 健康</div>
  </div>

  <button id="btn" onclick="generate()">🎀 生成並下載 人生里程碑.pptx</button>
  <p id="status">點擊按鈕開始生成（約 5–10 秒）✨</p>
</div>

<script>
function tick(){return new Promise(r=>setTimeout(r,20));}

async function generate(){
  const btn=document.getElementById('btn');
  const st=document.getElementById('status');
  btn.disabled=true;

  const W=13.33, H=7.5;

  // ── Palette ──
  const BG='F8FFFE';
  const WHITE='FFFFFF';

  // Per-age rotating color themes (13 ages → 13 themes cycling through pastels)
  const THEMES=[
    {name:'蒂芬妮藍', bg:'E0F7F7', hdr:'B2E8E8', acc:'5BBDBD', dark:'2D7D7D', card:'F0FAFA', line:'B2E8E8', emoji:'🌊'},
    {name:'粉粉紅',   bg:'FFF0F5', hdr:'FFD3E0', acc:'F09AB0', dark:'AA4466', card:'FFF8FA', line:'FFD3E0', emoji:'🌸'},
    {name:'粉綠',     bg:'F0FFF8', hdr:'A8E6CF', acc:'5BBD90', dark:'2D6B4A', card:'F5FFFB', line:'A8E6CF', emoji:'🌿'},
    {name:'粉黃',     bg:'FFFDF0', hdr:'FFF3B0', acc:'DDBB33', dark:'886600', card:'FFFEF8', line:'FFF3B0', emoji:'🌟'},
    {name:'薰衣草',   bg:'F8F0FF', hdr:'D4B8E0', acc:'A070CC', dark:'5A2E8A', card:'FBF5FF', line:'D4B8E0', emoji:'💜'},
    {name:'蜜桃橘',   bg:'FFF6F0', hdr:'FFD9B3', acc:'F0966A', dark:'8A4422', card:'FFF9F5', line:'FFD9B3', emoji:'🍑'},
    {name:'天空藍',   bg:'F0F6FF', hdr:'B8D4F0', acc:'5A8FD4', dark:'2A5299', card:'F5F9FF', line:'B8D4F0', emoji:'☁️'},
    {name:'薄荷綠',   bg:'F0FFF5', hdr:'B8EDD4', acc:'4AB888', dark:'1A6644', card:'F5FFFA', line:'B8EDD4', emoji:'🍃'},
    {name:'玫瑰金',   bg:'FFF5F5', hdr:'F5C8C8', acc:'D47878', dark:'882244', card:'FFF8F8', line:'F5C8C8', emoji:'🌹'},
    {name:'奶藍',     bg:'F5FAFF', hdr:'C8DEFF', acc:'6699DD', dark:'224488', card:'F8FCFF', line:'C8DEFF', emoji:'🫐'},
    {name:'抹茶',     bg:'F5FFF0', hdr:'C8EEB0', acc:'70BB44', dark:'2A6614', card:'F8FFF5', line:'C8EEB0', emoji:'🍵'},
    {name:'棉花糖',   bg:'FFF5FB', hdr:'F5C8E8', acc:'D470B0', dark:'882266', card:'FFF8FD', line:'F5C8E8', emoji:'🍭'},
    {name:'檸檬',     bg:'FFFFF0', hdr:'EEEEBB', acc:'BBBB44', dark:'666600', card:'FFFFF8', line:'EEEEBB', emoji:'🍋'},
  ];

  const CATS=[
    {key:'生活', emoji:'🌈', bg:'E0F7F7', acc:'5BBDBD', dark:'2D7D7D', light:'B2E8E8'},
    {key:'工作', emoji:'💼', bg:'FFF0F5', acc:'F09AB0', dark:'AA4466', light:'FFD3E0'},
    {key:'學習', emoji:'📚', bg:'F0FFF8', acc:'5BBD90', dark:'2D6B4A', light:'A8E6CF'},
    {key:'健康', emoji:'🌿', bg:'FFFDF0', acc:'DDBB33', dark:'886600', light:'FFF3B0'},
  ];

  const MONTHS=['一月','二月','三月','四月','五月','六月','七月','八月','九月','十月','十一月','十二月'];
  const MNUM=['01','02','03','04','05','06','07','08','09','10','11','12'];
  // cute deco chars cycling per month
  const DECOS=['✿','★','♡','◎','✦','◇','♪','✾','◉','♧','✤','☆'];

  const pres=new PptxGenJS();
  pres.layout='LAYOUT_WIDE';

  const bgFill=(s,c=BG)=>s.addShape('rect',{x:0,y:0,w:W,h:H,fill:{color:c},line:{type:'none'}});

  // ── COVER ──
  st.textContent='✨ 建立封面...'; await tick();
  {
    const s=pres.addSlide();
    bgFill(s,'F8FFFE');

    // pastel block mosaic top-right
    const blocks=[
      {x:9.5,y:0,w:3.83,h:2.5,c:'E0F7F7'},{x:10.5,y:0,w:2.83,h:1.8,c:'FFD3E0'},
      {x:11.2,y:0,w:2.13,h:1.0,c:'FFF3B0'},{x:9.5,y:2.5,w:1.9,h:2.2,c:'D4B8E0'},
      {x:11.4,y:2.0,w:1.93,h:1.4,c:'A8E6CF'},
    ];
    blocks.forEach(b=>s.addShape('rect',{x:b.x,y:b.y,w:b.w,h:b.h,fill:{color:b.c},line:{type:'none'}}));

    // wavy bottom strip
    s.addShape('rect',{x:0,y:H-0.8,w:W,h:0.8,fill:{color:'E0F7F7'},line:{type:'none'}});
    s.addShape('rect',{x:0,y:H-0.52,w:W,h:0.52,fill:{color:'B2E8E8'},line:{type:'none'}});
    s.addShape('rect',{x:0,y:H-0.28,w:W,h:0.28,fill:{color:'81D4D4'},line:{type:'none'}});

    // left deco bar
    s.addShape('rect',{x:0,y:0,w:0.6,h:H,fill:{color:'B2E8E8'},line:{type:'none'}});
    s.addShape('rect',{x:0,y:0,w:0.3,h:H,fill:{color:'81D4D4'},line:{type:'none'}});

    // floating deco circles
    [[1.2,0.3,'FFD3E0',0.55],[2.1,0.1,'FFF3B0',0.4],[8.5,1.1,'D4B8E0',0.65],[7.8,0.2,'A8E6CF',0.35]].forEach(([x,y,c,r])=>{
      s.addShape('ellipse',{x,y,w:r,h:r,fill:{color:c},line:{type:'none'}});
    });

    // eyebrow
    s.addText('✦  L I F E  M I L E S T O N E  ✦',{x:0.8,y:1.2,w:8.5,h:0.38,fontSize:10,color:'81D4D4',fontFace:'Arial',charSpacing:2,bold:true});
    // main title
    s.addText('我的人生里程碑',{x:0.8,y:1.65,w:8.8,h:1.75,fontSize:56,bold:true,color:'2D7D7D',fontFace:'Microsoft JhengHei'});
    // sub title with deco
    s.addText('🌸  20 歲 ——— 32 歲  🌸',{x:0.8,y:3.45,w:7,h:0.65,fontSize:20,color:'5BBDBD',fontFace:'Microsoft JhengHei'});

    // dotted divider
    s.addShape('rect',{x:0.8,y:4.18,w:6,h:0.04,fill:{color:'B2E8E8'},line:{type:'none'}});

    s.addText('記錄每一個閃亮的人生時刻 ✨',{x:0.8,y:4.35,w:8,h:0.42,fontSize:13,color:'7ABFBF',fontFace:'Microsoft JhengHei'});

    // cat pills row
    CATS.forEach((c,i)=>{
      const px=0.8+i*2.58;
      s.addShape('rect',{x:px,y:5.1,w:2.38,h:0.52,fill:{color:c.bg},line:{color:c.light,width:2}});
      s.addText(`${c.emoji} ${c.key}`,{x:px,y:5.1,w:2.38,h:0.52,fontSize:13,bold:true,color:c.dark,align:'center',valign:'middle',fontFace:'Microsoft JhengHei'});
    });

    s.addText('My Life Milestone  ·  Cute Pastel Edition',{x:0.8,y:H-0.74,w:9,h:0.24,fontSize:9,color:'81D4D4',fontFace:'Arial'});
  }

  // ── AGE SLIDES ──
  const MX=0.22, HDR=1.22, GAP=0.1, COLS=4, ROWS=3;
  const cW=(W-2*MX-(COLS-1)*GAP)/COLS;
  const cH=(H-HDR-0.12-(ROWS-1)*GAP)/ROWS;

  for(let age=20;age<=32;age++){
    st.textContent=`🎀 建立 ${age} 歲頁面 (${age-19}/13)...`; await tick();
    const T=THEMES[age-20];
    const s=pres.addSlide();
    bgFill(s,T.bg);

    // header band
    s.addShape('rect',{x:0,y:0,w:W,h:HDR-0.04,fill:{color:T.hdr},line:{type:'none'}});
    // header left accent
    s.addShape('rect',{x:0,y:0,w:0.5,h:HDR-0.04,fill:{color:T.acc},line:{type:'none'}});
    // header right deco block
    s.addShape('rect',{x:W-2.2,y:0,w:2.2,h:HDR-0.04,fill:{color:'rgba(255,255,255,0.45)'},line:{type:'none'}});
    // floating circle deco on header
    s.addShape('ellipse',{x:W-1.5,y:-0.3,w:1.4,h:1.4,fill:{color:T.hdr},line:{color:T.acc,width:1.5}});
    s.addShape('ellipse',{x:W-2.6,y:0.1,w:0.7,h:0.7,fill:{color:WHITE},line:{type:'none'}});

    // bottom wave strip
    s.addShape('rect',{x:0,y:H-0.35,w:W,h:0.35,fill:{color:T.hdr},line:{type:'none'}});
    s.addShape('rect',{x:0,y:H-0.18,w:W,h:0.18,fill:{color:T.acc},line:{type:'none'}});

    // age big number
    s.addText(T.emoji,{x:0.65,y:0.0,w:0.75,h:0.75,fontSize:28,valign:'middle'});
    s.addText(`${age}`,{x:1.28,y:0.02,w:1.85,h:0.92,fontSize:58,bold:true,color:T.dark,fontFace:'Arial'});
    s.addText('歲',{x:2.88,y:0.5,w:0.55,h:0.42,fontSize:16,bold:true,color:T.acc,fontFace:'Microsoft JhengHei'});
    s.addText(`✦ 人生第 ${age-19} 個章節`,{x:3.55,y:0.12,w:6,h:0.36,fontSize:11,bold:true,color:T.dark,fontFace:'Microsoft JhengHei'});
    s.addText(`${age} years old  ·  ${T.name}`,{x:3.55,y:0.52,w:6,h:0.3,fontSize:10,color:T.acc,fontFace:'Arial'});
    // separator squiggle (dashed line simulation)
    s.addShape('rect',{x:0,y:HDR-0.04,w:W,h:0.06,fill:{color:T.acc},line:{type:'none'}});

    // 12 month cards
    MONTHS.forEach((month,idx)=>{
      const col=idx%COLS, row=Math.floor(idx/COLS);
      const x=MX+col*(cW+GAP), y=HDR+row*(cH+GAP);
      const deco=DECOS[idx];

      // card shadow
      s.addShape('rect',{x:x+0.05,y:y+0.06,w:cW,h:cH,fill:{color:T.line},line:{type:'none'}});
      // card body
      s.addShape('rect',{x,y,w:cW,h:cH,fill:{color:WHITE},line:{color:T.line,width:1.5}});
      // top colour band
      s.addShape('rect',{x,y,w:cW,h:0.28,fill:{color:T.hdr},line:{type:'none'}});
      // deco dot left
      s.addShape('ellipse',{x:x+0.1,y:y+0.06,w:0.16,h:0.16,fill:{color:T.acc},line:{type:'none'}});
      // month number
      s.addText(MNUM[idx],{x:x+0.3,y:y+0.04,w:0.45,h:0.2,fontSize:9,bold:true,color:T.dark,fontFace:'Arial'});
      // month name
      s.addText(month,{x:x+0.7,y:y+0.04,w:cW-0.85,h:0.2,fontSize:10,bold:true,color:T.dark,align:'right',fontFace:'Microsoft JhengHei'});
      // deco char bottom-right of header
      s.addText(deco,{x:x+cW-0.34,y:y+0.04,w:0.28,h:0.2,fontSize:11,color:T.acc,align:'center',fontFace:'Arial'});

      // editable content area
      s.addText('• 輸入本月記事 ✦',{x:x+0.14,y:y+0.34,w:cW-0.28,h:0.24,fontSize:9.5,bold:false,color:'BBBBBB',fontFace:'Microsoft JhengHei'});
      s.addText('',{x:x+0.14,y:y+0.58,w:cW-0.28,h:cH-0.68,fontSize:10,color:'555555',valign:'top',wrap:true,fontFace:'Microsoft JhengHei'});

      // guide lines (dotted feel — alternating)
      [0.58,0.88,1.18,1.48].forEach((off,li)=>{
        if(off<cH-0.25) s.addShape('rect',{x:x+0.12,y:y+off,w:cW-0.24,h:0.01,fill:{color:li%2===0?T.line:'F0F0F0'},line:{type:'none'}});
      });

      // bottom right corner deco dot
      s.addShape('ellipse',{x:x+cW-0.22,y:y+cH-0.22,w:0.14,h:0.14,fill:{color:T.hdr},line:{type:'none'}});
    });

    s.addText(`${age} ✦ 32`,{x:W-1.3,y:H-0.32,w:1.15,h:0.2,fontSize:8,color:T.acc,align:'right',fontFace:'Arial'});
  }

  // ── MILESTONE SUMMARY ──
  st.textContent='🌈 建立里程碑總覽...'; await tick();
  {
    const s=pres.addSlide();
    bgFill(s,'F8FFFE');

    // header
    s.addShape('rect',{x:0,y:0,w:W,h:1.08,fill:{color:'B2E8E8'},line:{type:'none'}});
    s.addShape('rect',{x:0,y:0,w:0.5,h:1.08,fill:{color:'5BBDBD'},line:{type:'none'}});
    // deco circles on header
    [[W-0.8,0.1,0.7,'81D4D4'],[W-1.8,0.3,0.45,'A8E6CF'],[W-2.5,0.0,0.55,'FFD3E0']].forEach(([x,y,r,c])=>{
      s.addShape('ellipse',{x,y,w:r,h:r,fill:{color:c},line:{type:'none'}});
    });
    s.addText('🌈  人生里程碑總覽',{x:0.65,y:0.1,w:8,h:0.55,fontSize:22,bold:true,color:'2D7D7D',fontFace:'Microsoft JhengHei'});
    s.addText('✦ 20 歲 — 32 歲  ·  生活 · 工作 · 學習 · 健康 ✦',{x:0.65,y:0.66,w:10,h:0.28,fontSize:10,color:'5BBDBD',fontFace:'Microsoft JhengHei'});

    const LW=0.85, GX=0.2+LW, GY=1.14;
    const GW=W-0.28-LW, GH=H-GY-0.28;
    const NY=13, yW=GW/NY;
    const HDH=0.4, rH=(GH-HDH)/4;

    // year headers
    for(let i=0;i<NY;i++){
      const age=20+i, x=GX+i*yW;
      const T=THEMES[i];
      s.addShape('rect',{x:x+0.02,y:GY,w:yW-0.04,h:HDH,fill:{color:T.hdr},line:{color:T.line,width:0.5}});
      s.addShape('ellipse',{x:x+(yW-0.22)/2,y:GY+0.03,w:0.22,h:0.22,fill:{color:T.acc},line:{type:'none'}});
      s.addText(`${age}`,{x:x+0.02,y:GY+0.18,w:yW-0.04,h:HDH-0.2,fontSize:8,bold:true,color:T.dark,align:'center',valign:'middle',fontFace:'Arial'});
    }

    // category rows
    CATS.forEach((cat,ci)=>{
      const ry=GY+HDH+ci*rH;
      // label
      s.addShape('rect',{x:0.2,y:ry+0.03,w:LW-0.04,h:rH-0.06,fill:{color:cat.bg},line:{color:cat.light,width:2}});
      s.addShape('rect',{x:0.2,y:ry+0.03,w:0.12,h:rH-0.06,fill:{color:cat.acc},line:{type:'none'}});
      s.addText(`${cat.emoji}\n${cat.key}`,{x:0.34,y:ry+0.03,w:LW-0.18,h:rH-0.06,fontSize:10,bold:true,color:cat.dark,align:'center',valign:'middle',fontFace:'Microsoft JhengHei'});

      for(let i=0;i<NY;i++){
        const x=GX+i*yW;
        const T=THEMES[i];
        const even=i%2===0;
        s.addShape('rect',{x:x+0.02,y:ry+0.03,w:yW-0.04,h:rH-0.06,fill:{color:even?cat.bg:WHITE},line:{color:cat.light,width:0.5}});
        // tiny deco dot
        s.addShape('ellipse',{x:x+0.07,y:ry+0.1,w:0.08,h:0.08,fill:{color:cat.acc},line:{type:'none'}});
        s.addText('點擊輸入',{x:x+0.02,y:ry+0.2,w:yW-0.04,h:rH-0.35,fontSize:6,color:cat.acc,align:'center',valign:'top',fontFace:'Microsoft JhengHei'});
      }
    });

    // bottom wave
    s.addShape('rect',{x:0,y:H-0.4,w:W,h:0.4,fill:{color:'E0F7F7'},line:{type:'none'}});
    s.addShape('rect',{x:0,y:H-0.22,w:W,h:0.22,fill:{color:'B2E8E8'},line:{type:'none'}});

    // legend
    CATS.forEach((c,i)=>{
      const lx=0.3+i*2.9;
      s.addShape('ellipse',{x:lx,y:H-0.36,w:0.16,h:0.16,fill:{color:c.acc},line:{type:'none'}});
      s.addText(`${c.emoji} ${c.key}`,{x:lx+0.22,y:H-0.38,w:2.5,h:0.2,fontSize:9,bold:true,color:c.dark,fontFace:'Microsoft JhengHei'});
    });
  }

  st.textContent='📦 輸出檔案中...'; await tick();
  const blob=await pres.write({outputType:'blob'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url; a.download='人生里程碑_可愛版.pptx';
  document.body.appendChild(a); a.click();
  setTimeout(()=>{URL.revokeObjectURL(url);document.body.removeChild(a);},3000);
  st.textContent='🎀 下載完成！請在 PowerPoint 中開啟編輯 ✨';
  btn.disabled=false;
}
</script>
</body>
