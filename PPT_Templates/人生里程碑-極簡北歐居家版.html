<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>人生里程碑 — 極簡北歐居家版</title>
<script src="https://cdn.jsdelivr.net/npm/pptxgenjs@3.12.0/dist/pptxgen.bundle.js"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Georgia',serif;background:#EDE8E1;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2.5rem 1rem;}
  .card{background:#F7F4EF;max-width:480px;width:100%;padding:3rem 2.6rem;border:none;}
  .leaf{font-size:28px;margin-bottom:1.4rem;opacity:.75;}
  h1{font-size:20px;font-weight:400;color:#3A3530;line-height:1.5;letter-spacing:.5px;margin-bottom:4px;font-family:'Georgia',serif;}
  .sub{font-size:11px;color:#9A9088;letter-spacing:2px;margin-bottom:2.2rem;font-family:'Georgia',serif;font-style:italic;}
  .rule{border:none;border-top:1px solid #D8D0C4;margin:1.8rem 0;}
  .stats{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:#D8D0C4;margin-bottom:2rem;}
  .stat{background:#F7F4EF;padding:1rem 1.1rem;}
  .sl{font-size:9px;letter-spacing:3px;color:#9A9088;margin-bottom:5px;}
  .sv{font-size:22px;font-weight:300;color:#3A3530;letter-spacing:-1px;margin-bottom:2px;}
  .ss{font-size:10px;color:#B0A898;font-style:italic;}
  .cats{display:flex;flex-direction:column;gap:1px;background:#D8D0C4;margin-bottom:2.2rem;}
  .cat-row{display:flex;align-items:center;gap:14px;padding:10px 14px;background:#F7F4EF;}
  .cat-swatch{width:8px;height:8px;border-radius:50%;}
  .cat-k{font-size:11px;color:#3A3530;width:38px;letter-spacing:.5px;}
  .cat-d{font-size:10px;color:#9A9088;flex:1;font-style:italic;}
  button{width:100%;padding:14px;font-size:10px;font-weight:400;letter-spacing:4px;background:transparent;color:#3A3530;border:1px solid #C0B8AC;cursor:pointer;font-family:'Georgia',serif;transition:background .2s;}
  button:hover:not(:disabled){background:#EDE8E1;}
  button:disabled{opacity:.35;cursor:default;}
  #status{text-align:center;font-size:10px;color:#9A9088;margin-top:10px;min-height:1.4em;font-style:italic;}
</style>
</head>
<body>
<div class="card">
  <div class="leaf">🌿</div>
  <h1>人生里程碑<br>極簡北歐居家版</h1>
  <p class="sub">scandi minimalist · morandi palette · age 20–32</p>
  <hr class="rule">
  <div class="stats">
    <div class="stat"><div class="sl">SLIDES</div><div class="sv">15</div><div class="ss">pages</div></div>
    <div class="stat"><div class="sl">YEARS</div><div class="sv">13</div><div class="ss">20 to 32</div></div>
    <div class="stat"><div class="sl">MONTHS</div><div class="sv">156</div><div class="ss">editable</div></div>
    <div class="stat"><div class="sl">THEMES</div><div class="sv">4</div><div class="ss">life · work · learn · health</div></div>
  </div>
  <div class="cats">
    <div class="cat-row"><div class="cat-swatch" style="background:#8FA8B2"></div><span class="cat-k">生活</span><span class="cat-d">日常記錄 · 人際 · 美好時刻</span></div>
    <div class="cat-row"><div class="cat-swatch" style="background:#A89880"></div><span class="cat-k">工作</span><span class="cat-d">職涯成長 · 成就 · 轉捩點</span></div>
    <div class="cat-row"><div class="cat-swatch" style="background:#8EA898"></div><span class="cat-k">學習</span><span class="cat-d">技能習得 · 進修 · 閱讀</span></div>
    <div class="cat-row"><div class="cat-swatch" style="background:#A89898"></div><span class="cat-k">健康</span><span class="cat-d">身心狀態 · 運動 · 療癒</span></div>
  </div>
  <button id="btn" onclick="generate()">generate &amp; download</button>
  <p id="status">ready — click to generate ( approx. 5–10s )</p>
</div>

<script>
function tick(){return new Promise(r=>setTimeout(r,20));}

async function generate(){
  const btn=document.getElementById('btn'), st=document.getElementById('status');
  btn.disabled=true;

  const W=13.33, H=7.5;

  // ── Morandi / Scandi Palette ──
  const LINEN  ='F7F4EF'; // warm linen white
  const LINEN2 ='F0EBE3'; // slightly deeper linen
  const LINEN3 ='E8E0D4'; // aged linen
  const SAND   ='DDD5C5'; // warm sand
  const RULE   ='D0C8B8'; // hairline rules
  const INK    ='3A3530'; // warm charcoal (never true black)
  const INK2   ='5A5248'; // body text
  const MUTED  ='9A9088'; // muted label
  const GHOST  ='C0B8AC'; // ghost / placeholder

  // 13 Morandi accent tones — low-saturation, nature-inspired
  const TONES=[
    {name:'霧藍',   acc:'8FA8B2', pale:'E2EBF0', mid:'B8CDD5', dark:'4A6A76'},
    {name:'燕麥',   acc:'B0A080', pale:'EDE8DC', mid:'CFC0A8', dark:'6A5C3C'},
    {name:'薄荷灰', acc:'8EA898', pale:'DFF0E8', mid:'B8D4C8', dark:'486860'},
    {name:'玫瑰灰', acc:'B09098', pale:'F0E4E8', mid:'D0B4BC', dark:'6A5058'},
    {name:'鼠尾草', acc:'90A888', pale:'E4EDE0', mid:'BCD0B4', dark:'506848'},
    {name:'薰衣草', acc:'A098B8', pale:'EAE8F4', mid:'C8C0D8', dark:'5A5070'},
    {name:'赭石',   acc:'A89070', pale:'EEE4D8', mid:'CDB898', dark:'685038'},
    {name:'苔蘚',   acc:'889A80', pale:'E0EAD8', mid:'B4C8AC', dark:'485A40'},
    {name:'藕粉',   acc:'B8A0A8', pale:'F0E8EC', mid:'D4C0C8', dark:'705060'},
    {name:'霧灰',   acc:'9AA0A8', pale:'E4E8EC', mid:'C0C8D0', dark:'506070'},
    {name:'茶棕',   acc:'A09080', pale:'EBE4DC', mid:'C8B8A8', dark:'605040'},
    {name:'粉藍',   acc:'98A8B8', pale:'E4EBF4', mid:'BEC8D8', dark:'485870'},
    {name:'冬白',   acc:'A8A8A0', pale:'EEEEE8', mid:'C8C8C0', dark:'606058'},
  ];

  const CATS=[
    {key:'生活', eng:'LIFE',   acc:'8FA8B2', pale:'E2EBF0', dark:'4A6A76'},
    {key:'工作', eng:'WORK',   acc:'A89880', pale:'EDE8DC', dark:'6A5C3C'},
    {key:'學習', eng:'LEARN',  acc:'8EA898', pale:'DFF0E8', dark:'486860'},
    {key:'健康', eng:'HEALTH', acc:'A89898', pale:'F0E4E8', dark:'6A5058'},
  ];

  const MZH=['一月','二月','三月','四月','五月','六月','七月','八月','九月','十月','十一月','十二月'];
  const MEN=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const MNUM=['01','02','03','04','05','06','07','08','09','10','11','12'];

  // Botanical SVG paths — simplified line-art shapes drawn with thin rects/ellipses
  // Each returns a drawing function (s, x, y, scale, color)
  const drawLeaf=(s,x,y,sc,c)=>{
    // stem
    s.addShape('rect',{x:x+0.18*sc,y:y,w:0.02*sc,h:0.7*sc,fill:{color:c},line:{type:'none'}});
    // left leaflets
    [[0.0,0.08,0.22,0.1,-15],[0.0,0.22,0.2,0.09,-18],[0.0,0.38,0.18,0.08,-12]].forEach(([dx,dy,lw,lh,rot])=>{
      s.addShape('ellipse',{x:x+dx*sc,y:y+dy*sc,w:lw*sc,h:lh*sc,fill:{color:c+'AA'},line:{type:'none'},rotate:rot});
    });
    // right leaflets
    [[0.18,0.14,0.22,0.1,15],[0.18,0.28,0.20,0.09,18],[0.18,0.44,0.18,0.08,12]].forEach(([dx,dy,lw,lh,rot])=>{
      s.addShape('ellipse',{x:x+dx*sc,y:y+dy*sc,w:lw*sc,h:lh*sc,fill:{color:c+'AA'},line:{type:'none'},rotate:rot});
    });
  };

  const drawSprig=(s,x,y,sc,c)=>{
    // main stem (diagonal)
    s.addShape('rect',{x,y,w:0.02*sc,h:0.55*sc,fill:{color:c},line:{type:'none'},rotate:-12});
    // small round berries / buds
    [[0.08,0.1],[0.18,0.22],[0.06,0.35],[0.2,0.44]].forEach(([dx,dy])=>{
      s.addShape('ellipse',{x:x+dx*sc,y:y+dy*sc,w:0.1*sc,h:0.1*sc,fill:{color:c+'BB'},line:{type:'none'}});
    });
    // tiny leaves
    [[0.0,0.15,0.14,0.06,-20],[0.12,0.28,0.14,0.06,15]].forEach(([dx,dy,lw,lh,rot])=>{
      s.addShape('ellipse',{x:x+dx*sc,y:y+dy*sc,w:lw*sc,h:lh*sc,fill:{color:c+'88'},line:{type:'none'},rotate:rot});
    });
  };

  const drawFern=(s,x,y,sc,c)=>{
    // spine
    s.addShape('rect',{x:x+0.16*sc,y:y,w:0.015*sc,h:0.8*sc,fill:{color:c},line:{type:'none'}});
    // fronds — left and right
    for(let i=0;i<5;i++){
      const fy=y+i*0.14*sc, fw=(0.22-i*0.03)*sc;
      s.addShape('ellipse',{x:x,y:fy,w:fw,h:0.07*sc,fill:{color:c+'99'},line:{type:'none'},rotate:-18+i*2});
      s.addShape('ellipse',{x:x+0.18*sc,y:fy+0.02*sc,w:fw,h:0.07*sc,fill:{color:c+'99'},line:{type:'none'},rotate:18-i*2});
    }
  };

  const drawTwig=(s,x,y,sc,c)=>{
    // horizontal branch
    s.addShape('rect',{x,y:y+0.25*sc,w:0.6*sc,h:0.018*sc,fill:{color:c},line:{type:'none'}});
    // vertical buds
    [[0.1,0],[0.24,0],[0.38,0],[0.52,0]].forEach(([dx,dy])=>{
      s.addShape('rect',{x:x+dx*sc,y:y+dy*sc,w:0.018*sc,h:0.28*sc,fill:{color:c+'BB'},line:{type:'none'}});
      s.addShape('ellipse',{x:x+dx*sc-0.02*sc,y:y+dy*sc,w:0.06*sc,h:0.08*sc,fill:{color:c+'99'},line:{type:'none'}});
    });
  };

  const BOTANICALS=[drawLeaf,drawSprig,drawFern,drawTwig,drawLeaf,drawSprig,drawFern,drawTwig,drawLeaf,drawSprig,drawFern,drawTwig,drawLeaf];

  const pres=new PptxGenJS();
  pres.layout='LAYOUT_WIDE';

  const bg=(s,c=LINEN)=>s.addShape('rect',{x:0,y:0,w:W,h:H,fill:{color:c},line:{type:'none'}});
  const hln=(s,x,y,w,c=RULE,th=0.01)=>s.addShape('rect',{x,y,w,h:th,fill:{color:c},line:{type:'none'}});
  const vln=(s,x,y,h,c=RULE)=>s.addShape('rect',{x,y,w:0.01,h,fill:{color:c},line:{type:'none'}});

  // Linen texture simulation — very faint grain lines
  const linenTexture=(s)=>{
    for(let i=0;i<22;i++) s.addShape('rect',{x:0,y:i*0.34,w:W,h:0.006,fill:{color:'00000006'},line:{type:'none'}});
    for(let i=0;i<38;i++) s.addShape('rect',{x:i*0.36,y:0,w:0.004,h:H,fill:{color:'00000004'},line:{type:'none'}});
  };

  // Soft vignette at edges (slightly darker corners)
  const vignette=(s)=>{
    s.addShape('ellipse',{x:-2,y:-2,w:5,h:5,fill:{color:'3A352022'},line:{type:'none'}});
    s.addShape('ellipse',{x:W-3,y:-2,w:5,h:5,fill:{color:'3A352018'},line:{type:'none'}});
    s.addShape('ellipse',{x:-2,y:H-3,w:5,h:5,fill:{color:'3A352018'},line:{type:'none'}});
    s.addShape('ellipse',{x:W-3,y:H-3,w:5,h:5,fill:{color:'3A352022'},line:{type:'none'}});
  };

  // ═══════════════ COVER ═══════════════
  st.textContent='Drawing cover...'; await tick();
  {
    const s=pres.addSlide();
    bg(s,LINEN);
    linenTexture(s);
    vignette(s);

    // Right panel — slightly deeper linen
    s.addShape('rect',{x:8.4,y:0,w:W-8.4,h:H,fill:{color:LINEN2},line:{type:'none'}});
    vln(s,8.4,0,H,RULE);

    // Large botanical illustrations — right panel
    drawFern(s,8.8,0.5,3.5,TONES[0].acc+'88');
    drawLeaf(s,11.2,1.2,2.8,TONES[4].acc+'66');
    drawSprig(s,9.6,4.0,2.4,TONES[2].acc+'77');
    drawTwig(s,8.7,5.8,2.6,TONES[7].acc+'66');

    // Left panel subtle botanical (corner)
    drawLeaf(s,0.1,4.8,2.2,TONES[0].acc+'33');
    drawSprig(s,6.2,5.5,1.8,TONES[2].acc+'33');

    // ── TITLE BLOCK ──
    // Top margin rule
    hln(s,0.7,0.62,7.4,'D0C8B888');

    s.addText('life milestone',{x:0.7,y:0.72,w:7.3,h:0.36,fontSize:11,color:MUTED,fontFace:'Georgia',italic:true,charSpacing:3});

    // Large airy title
    s.addText('我的',{x:0.7,y:1.12,w:7.4,h:1.05,fontSize:54,bold:false,color:GHOST,fontFace:'Microsoft JhengHei'});
    s.addText('人生里程碑',{x:0.7,y:2.05,w:7.4,h:1.28,fontSize:52,bold:false,color:INK,fontFace:'Microsoft JhengHei'});

    hln(s,0.7,3.42,4.0,RULE);
    hln(s,0.7,3.46,2.5,SAND);

    s.addText('20 歲 ———— 32 歲',{x:0.7,y:3.58,w:6,h:0.44,fontSize:15,color:INK2,fontFace:'Georgia'});
    s.addText('記錄每一個靜好的人生時刻',{x:0.7,y:4.08,w:6.5,h:0.36,fontSize:12,color:MUTED,fontFace:'Microsoft JhengHei',italic:true});
    s.addText('document the quiet beauty of living',{x:0.7,y:4.5,w:6.5,h:0.3,fontSize:10,color:GHOST,fontFace:'Georgia',italic:true});

    hln(s,0.7,5.0,4.8,'D0C8B855');

    // Category row — minimal pills
    CATS.forEach((c,i)=>{
      const px=0.7+i*1.65;
      s.addShape('rect',{x:px,y:5.2,w:1.5,h:0.32,fill:{color:c.pale},line:{color:c.acc,width:0.4}});
      s.addText(c.key,{x:px,y:5.2,w:1.5,h:0.32,fontSize:10,color:c.dark,align:'center',valign:'middle',fontFace:'Microsoft JhengHei'});
    });

    // Bottom rule + colophon
    hln(s,0.7,H-0.5,7.3,'D0C8B888');
    s.addText('Scandi Minimalist Life Edition  ·  極簡北歐居家版',{x:0.7,y:H-0.44,w:7.3,h:0.26,fontSize:8.5,color:GHOST,fontFace:'Georgia',italic:true});
  }

  // ═══════════════ AGE SLIDES 20–32 ═══════════════
  const MX=0.26, HDR=1.28, GAP=0.1, COLS=4, ROWS=3;
  const cW=(W-2*MX-(COLS-1)*GAP)/COLS;
  const cH=(H-HDR-0.16-(ROWS-1)*GAP)/ROWS;

  for(let age=20;age<=32;age++){
    const li=age-20, T=TONES[li];
    st.textContent=`Drawing age ${age} (${li+1}/13)...`; await tick();
    const s=pres.addSlide();
    bg(s,LINEN);
    linenTexture(s);
    vignette(s);

    // Left accent column
    s.addShape('rect',{x:0,y:0,w:0.38,h:H,fill:{color:T.pale},line:{type:'none'}});
    vln(s,0.38,0,H,RULE);

    // Header band
    s.addShape('rect',{x:0.38,y:0,w:W-0.38,h:HDR-0.04,fill:{color:LINEN2},line:{type:'none'}});
    hln(s,0.38,HDR-0.04,W-0.38,T.acc+'88');

    // Botanical illustration — top right (unique per age)
    const bot=BOTANICALS[li];
    bot(s,W-2.1,0.1,2.4,T.acc+'66');

    // Small accent dot left column
    s.addShape('ellipse',{x:0.1,y:HDR/2-0.1,w:0.18,h:0.18,fill:{color:T.acc+'AA'},line:{type:'none'}});

    // Age number — very large, light weight
    s.addText(`${age}`,{x:0.52,y:0.06,w:1.7,h:0.96,fontSize:54,bold:false,color:T.acc,fontFace:'Georgia'});
    s.addText('歲',{x:2.08,y:0.6,w:0.44,h:0.38,fontSize:14,color:T.mid,fontFace:'Microsoft JhengHei'});

    // Vertical rule
    vln(s,2.68,0.2,0.76,RULE);

    s.addText(`人生第 ${li+1} 章`,{x:2.82,y:0.2,w:5.5,h:0.38,fontSize:13,color:INK,fontFace:'Microsoft JhengHei'});
    s.addText(`Chapter ${li+1} of 13  ·  ${T.name}`,{x:2.82,y:0.62,w:6,h:0.28,fontSize:10,color:MUTED,fontFace:'Georgia',italic:true});

    // Thin progress bar
    s.addShape('rect',{x:2.82,y:1.0,w:5.8,h:0.04,fill:{color:SAND},line:{type:'none'}});
    s.addShape('rect',{x:2.82,y:1.0,w:5.8*(li/12),h:0.04,fill:{color:T.acc},line:{type:'none'}});
    s.addText(`${Math.round((li/12)*100)}%`,{x:8.68,y:0.96,w:0.55,h:0.18,fontSize:8,color:MUTED,fontFace:'Georgia'});

    // ── 12 MONTH CARDS ──
    MZH.forEach((mZh,idx)=>{
      const col=idx%COLS, row=Math.floor(idx/COLS);
      const x=MX+0.38+col*(cW+GAP), y=HDR+row*(cH+GAP);

      // card — clean white surface, single hairline border
      s.addShape('rect',{x,y,w:cW,h:cH,fill:{color:LINEN},line:{color:RULE,width:0.4}});
      // top accent line (colour)
      s.addShape('rect',{x,y,w:cW,h:0.025,fill:{color:T.acc},line:{type:'none'}});
      // header area
      s.addShape('rect',{x,y:y+0.025,w:cW,h:0.26,fill:{color:T.pale},line:{type:'none'}});
      hln(s,x,y+0.285,cW,RULE,0.008);

      // Month number — small, light
      s.addText(MNUM[idx],{x:x+0.12,y:y+0.04,w:0.38,h:0.2,fontSize:9,color:T.dark,fontFace:'Georgia'});
      // ZH month name
      s.addText(mZh,{x:x+0.48,y:y+0.05,w:1.1,h:0.2,fontSize:10,color:INK,fontFace:'Microsoft JhengHei'});
      // EN name
      s.addText(MEN[idx],{x:x+cW-1.05,y:y+0.06,w:0.98,h:0.18,fontSize:8.5,color:MUTED,align:'right',fontFace:'Georgia',italic:true});

      // Tiny botanical deco (every 3rd card gets one)
      if(idx%3===0){
        const miniBot=BOTANICALS[(li+idx)%5];
        miniBot(s,x+cW-0.58,y+0.04,0.6,T.acc+'44');
      }

      // Placeholder
      s.addText('記錄這個月⋯',{x:x+0.12,y:y+0.32,w:cW-0.24,h:0.2,fontSize:9,color:GHOST,fontFace:'Microsoft JhengHei',italic:true});
      // Editable body
      s.addText('',{x:x+0.12,y:y+0.5,w:cW-0.24,h:cH-0.62,fontSize:9.5,color:INK2,valign:'top',wrap:true,fontFace:'Microsoft JhengHei'});
      // Hairline ruled lines
      [0.5,0.72,0.94,1.16,1.38].forEach(off=>{
        if(off<cH-0.2) hln(s,x+0.1,y+off,cW-0.2,SAND,0.008);
      });
    });

    // Footer
    hln(s,0.44,H-0.26,W-0.56,RULE+'66');
    s.addText(`age ${age}  ·  ${T.name}  ·  life milestone`,{x:0.5,y:H-0.22,w:8,h:0.18,fontSize:8,color:GHOST,fontFace:'Georgia',italic:true});
    s.addText(`${li+1} / 13`,{x:W-1.4,y:H-0.22,w:1.2,h:0.18,fontSize:8,color:MUTED,align:'right',fontFace:'Georgia'});
  }

  // ═══════════════ SUMMARY ═══════════════
  st.textContent='Drawing summary...'; await tick();
  {
    const s=pres.addSlide();
    bg(s,LINEN);
    linenTexture(s);
    vignette(s);

    // Header
    s.addShape('rect',{x:0,y:0,w:W,h:1.04,fill:{color:LINEN2},line:{type:'none'}});
    hln(s,0,1.04,W,RULE);
    vln(s,0.38,0,1.04,RULE);
    s.addShape('rect',{x:0,y:0,w:0.38,h:1.04,fill:{color:SAND},line:{type:'none'}});

    // Botanical header right
    drawFern(s,W-2.4,0.04,2.2,TONES[0].acc+'55');
    drawSprig(s,W-1.4,0.5,1.5,TONES[4].acc+'44');

    s.addText('milestone',{x:0.52,y:0.06,w:5,h:0.36,fontSize:11,color:MUTED,fontFace:'Georgia',italic:true,charSpacing:2});
    s.addText('人生里程碑總覽',{x:0.52,y:0.42,w:8,h:0.46,fontSize:18,bold:false,color:INK,fontFace:'Microsoft JhengHei'});
    s.addText('20 歲 — 32 歲  ·  生活 · 工作 · 學習 · 健康',{x:0.52,y:0.86,w:10,h:0.22,fontSize:9,color:MUTED,fontFace:'Georgia',italic:true});

    // Grid
    const LW=0.9, GX=0.28+LW, GY=1.12;
    const GW=W-0.32-LW, GH=H-GY-0.24;
    const NY=13, yW=GW/NY, HDH=0.42, rH=(GH-HDH)/4;

    // Year headers
    for(let i=0;i<NY;i++){
      const T=TONES[i], x=GX+i*yW, even=i%2===0;
      s.addShape('rect',{x:x+0.01,y:GY,w:yW-0.02,h:HDH,fill:{color:even?T.pale:LINEN},line:{color:RULE,width:0.3}});
      s.addShape('rect',{x:x+0.01,y:GY,w:yW-0.02,h:0.025,fill:{color:T.acc},line:{type:'none'}});
      s.addText(`${20+i}`,{x:x+0.01,y:GY+0.06,w:yW-0.02,h:0.26,fontSize:9.5,color:T.dark,align:'center',fontFace:'Georgia'});
      // tiny botanical dot
      s.addShape('ellipse',{x:x+yW/2-0.06,y:GY+0.32,w:0.08,h:0.08,fill:{color:T.acc+'99'},line:{type:'none'}});
    }

    // Category rows
    CATS.forEach((cat,ci)=>{
      const ry=GY+HDH+ci*rH;
      // Label
      s.addShape('rect',{x:0.28,y:ry+0.02,w:LW-0.06,h:rH-0.04,fill:{color:cat.pale},line:{color:cat.acc,width:0.4}});
      s.addShape('rect',{x:0.28,y:ry+0.02,w:0.04,h:rH-0.04,fill:{color:cat.acc},line:{type:'none'}});
      s.addText(cat.key,{x:0.36,y:ry+0.02,w:LW-0.14,h:rH-0.04,fontSize:10,color:cat.dark,align:'center',valign:'middle',fontFace:'Microsoft JhengHei'});

      for(let i=0;i<NY;i++){
        const x=GX+i*yW, even=i%2===0, T=TONES[i];
        s.addShape('rect',{x:x+0.01,y:ry+0.02,w:yW-0.02,h:rH-0.04,fill:{color:even?cat.pale:LINEN},line:{color:RULE,width:0.25}});
        // hairline guide inside cell
        hln(s,x+0.04,ry+0.02+rH*0.5,yW-0.1,SAND,0.006);
      }
    });

    // Botanical corners on summary
    drawLeaf(s,0.05,GY+0.6,1.8,TONES[2].acc+'44');
    drawTwig(s,W-2.2,H-1.2,2.0,TONES[5].acc+'44');

    // Footer
    hln(s,0.28,H-0.26,W-0.4,RULE+'66');
    CATS.forEach((c,i)=>{
      const lx=0.32+i*2.9;
      s.addShape('rect',{x:lx,y:H-0.2,w:0.2,h:0.08,fill:{color:c.acc+'BB'},line:{type:'none'}});
      s.addText(c.key,{x:lx+0.28,y:H-0.22,w:2.5,h:0.18,fontSize:8.5,color:MUTED,fontFace:'Microsoft JhengHei'});
    });
    s.addText('Scandi Minimalist Life Edition',{x:W-4.5,y:H-0.22,w:4.3,h:0.18,fontSize:8,color:GHOST,align:'right',fontFace:'Georgia',italic:true});
  }

  st.textContent='Exporting...'; await tick();
  const blob=await pres.write({outputType:'blob'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url; a.download='人生里程碑_極簡北歐居家版.pptx';
  document.body.appendChild(a); a.click();
  setTimeout(()=>{URL.revokeObjectURL(url);document.body.removeChild(a);},3000);
  st.textContent='done — 人生里程碑_北歐極簡版.pptx';
  btn.disabled=false;
}
</script>
